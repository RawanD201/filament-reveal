name: Bug report
description: Report a reproducible bug
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and what you expected to happen.
      placeholder: "When I click reveal, it..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps or a small code sample to reproduce.
      placeholder: |
        1. Install package
        2. Add RevealColumn to table
        3. Click eye icon
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: Package version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: "8.2.x"
    validations:
      required: true

  - type: input
    id: laravel-version
    attributes:
      label: Laravel version
      placeholder: "11.x"
    validations:
      required: true

  - type: input
    id: filament-version
    attributes:
      label: Filament version
      placeholder: "4.x / 5.x"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / stack trace
      render: shell
      placeholder: Paste any relevant output here.

